services:
  db:
    image: postgres:17-alpine
    container_name: tutory_db
    restart: always
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: tutory_dev
    ports:
      - "5432:5432"
    volumes:
      - tutory_data:/var/lib/postgresql/data

volumes:
  tutory_data:
